apiVersion: apps/v1
kind: Deployment
metadata:
  name: spendwise-bo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spendwise-bo
  template:
    metadata:
      labels:
        app: spendwise-bo
    spec:
      containers:
        - name: spendwise-bo
          image: prasantdas123/spendwise-app-backend:jun01-v1
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-db-service:5432/spendWise
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: '111111'
            # Auth0 JWT validation – must match the values in application.properties.
            # Override here so the same image works across environments.
            - name: OKTA_OAUTH2_ISSUER
              value: "https://dev-c5ls7veng3ljfc5g.us.auth0.com/"
            - name: OKTA_OAUTH2_AUDIENCE
              value: "https://spendwise-backend-api"
---
apiVersion: v1
kind: Service
metadata:
  name: spendwise-bo-service
spec:
  selector:
    app: spendwise-bo
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer