# -------------------------
# PersistentVolumeClaim for Postgres
# -------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: default   # replace with your cluster’s StorageClass

---
# -------------------------
# Postgres Deployment
# -------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
        - name: postgres-db
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: spendWise
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: "111111"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pgdata

---
# -------------------------
# Postgres Service
# -------------------------
apiVersion: v1
kind: Service
metadata:
  name: postgres-db-service
spec:
  selector:
    app: postgres-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  clusterIP: None   # headless service for stateful DB

---
# -------------------------
# Backend Deployment
# -------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spendwise-bo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spendwise-bo
  template:
    metadata:
      labels:
        app: spendwise-bo
    spec:
      containers:
        - name: spendwise-bo
          image: prasantdas123/spendwise-app-backend:may29-v1
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-db-service:5432/spendWise
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: "111111"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
# -------------------------
# Backend Service
# -------------------------
apiVersion: v1
kind: Service
metadata:
  name: spendwise-bo-service
spec:
  selector:
    app: spendwise-bo
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer   # use NodePort if running locally
